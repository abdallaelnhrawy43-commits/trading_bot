<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
    margin:0;
    font-family:Segoe UI;
    background:#020617;
    color:white;
}

/* HEADER /
.header {
    padding:20px;
    text-align:center;
    border-bottom:1px solid #1e293b;
}

/ STATS /
.stats {
    display:flex;
    justify-content:center;
    gap:20px;
    margin:20px;
}

.card {
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    width:200px;
    text-align:center;
}

/ TABLE /
table {
    width:90%;
    margin:auto;
    border-collapse:collapse;
}

th, td {
    padding:10px;
    border-bottom:1px solid #1e293b;
}

th {
    background:#22c55e;
}

/ BUTTONS */
.btn {
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.activate { background:#22c55e; }
.delete { background:red; }

</style>
</head>

<body>

<div class="header">
<h1>👑 Admin Dashboard</h1>
</div>

<div class="stats">
<div class="card">
<h3>Total Users</h3>
<p>{{total_users}}</p>
</div>

<div class="card">
<h3>Paid Users</h3>
<p>{{paid_users}}</p>
</div>

<div class="card">
<h3>Revenue</h3>
<p>${{revenue}}</p>
</div>
</div>

<table>
<tr>
<th>ID</th>
<th>Email</th>
<th>Plan</th>
<th>Paid</th>
<th>Expiry</th>
<th>Actions</th>
</tr>

{% for u in users %}
<tr>
<td>{{u[0]}}</td>
<td>{{u[1]}}</td>
<td>{{u[2]}}</td>
<td>{{u[3]}}</td>
<td>{{u[4]}}</td>

<td>
<form action="/activate-user" method="POST" style="display:inline;">
<input type="hidden" name="id" value="{{u[0]}}">
<button class="btn activate">Activate</button>
</form>

<form action="/delete-user" method="POST" style="display:inline;">
<input type="hidden" name="id" value="{{u[0]}}">
<button class="btn delete">Delete</button>
</form>
</td>

</tr>
{% endfor %}

</table>

</body>
</html
